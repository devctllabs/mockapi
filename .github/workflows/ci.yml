name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -t .

  generated-server:
    runs-on: ubuntu-latest
    env:
      FIXTURE_ROOT: ${{ github.workspace }}/.tmp/mockapi-generated-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11"

      - name: Prepare generated server fixture
        run: python .github/scripts/prepare_generated_server_fixture.py --root "$FIXTURE_ROOT"

      - name: Run generate.py with codegen
        run: |
          python skills/mockapi/scripts/generate.py \
            --root "$FIXTURE_ROOT" \
            --profile .mockapi/profile.toml \
            --run-codegen

      - name: Run package check
        working-directory: ${{ env.FIXTURE_ROOT }}/mock-server
        run: pnpm check

      - name: Run package build
        working-directory: ${{ env.FIXTURE_ROOT }}/mock-server
        run: pnpm build
